<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteScan — Abbotsford Development Feasibility</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f2;
      --surface: #ffffff;
      --border: #e0ddd8;
      --accent: #9e0000;
      --accent-hover: #7a0000;
      --accent-dim: #f5e6e6;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --green: #2e7d32;
      --yellow: #b45309;
      --red: #9e0000;
      --radius: 4px;
      --font: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 80px;
    }

    /* Top nav bar */
    .topbar {
      width: 100%;
      background: #1a1a1a;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
    }

    .topbar-brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
    }

    .topbar-brand span { color: var(--accent); }

    .topbar-sub {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
      padding: 0 16px;
    }

    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #1a1a1a;
      text-transform: uppercase;
    }

    header h1 span { color: var(--accent); }

    header p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Thin red rule under header */
    .rule {
      width: 48px;
      height: 3px;
      background: var(--accent);
      margin: 14px auto 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 720px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      position: relative;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    input[type="text"]::placeholder { color: var(--muted); }

    /* Autocomplete dropdown */
    .suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      z-index: 100;
      overflow: hidden;
      display: none;
    }

    .suggestions.open { display: block; }

    .suggestion-item {
      padding: 11px 16px;
      font-size: 0.88rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
      line-height: 1.4;
    }

    .suggestion-item:last-child { border-bottom: none; }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .suggestion-item .sug-score {
      float: right;
      font-size: 0.72rem;
      color: var(--muted);
      margin-left: 8px;
    }

    button {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 28px;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Step pipeline */
    .pipeline {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .step {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
    }

    .step-badge {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 700;
      height: 28px;
      width: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step.active .step-badge { border-color: var(--accent); color: var(--accent); }
    .step.done .step-badge { background: var(--green); border-color: var(--green); color: #fff; }
    .step.error .step-badge { background: var(--red); border-color: var(--red); color: #fff; }

    .step-title {
      font-size: 0.9rem;
      font-weight: 600;
      flex: 1;
    }

    .step-status {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .step.active .step-status { color: var(--accent); }
    .step.done .step-status { color: var(--green); }
    .step.error .step-status { color: var(--red); }

    .step-body {
      border-top: 1px solid var(--border);
      padding: 16px 18px;
      display: none;
    }

    .step.done .step-body,
    .step.error .step-body { display: block; }

    /* Result grid */
    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .result-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px 12px;
    }

    .result-item label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .result-item .val {
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
      word-break: break-all;
    }

    .result-item .val.highlight { color: var(--accent); font-weight: 700; }

    .error-msg {
      color: var(--red);
      font-size: 0.85rem;
      line-height: 1.5;
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* Raw JSON toggle */
    details summary {
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 12px;
      user-select: none;
    }

    details summary:hover { color: var(--text); }

    pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.5;
      margin-top: 8px;
      overflow-x: auto;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    footer {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 32px;
      text-align: center;
      padding: 0 16px;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">Site<span>Scan</span></div>
  <div class="topbar-sub">Abbotsford, BC</div>
</div>

<header>
  <h1>Development <span>Feasibility</span></h1>
  <p>Multifamily Site Analysis Tool</p>
  <div class="rule"></div>
</header>

<!-- Address Input -->
<div class="card">
  <h2>Enter Civic Address</h2>
  <div class="input-row">
    <div class="input-wrap">
      <input
        type="text"
        id="addressInput"
        placeholder="e.g. 2789 Gladwin Rd, Abbotsford, BC"
        autocomplete="off"
        aria-autocomplete="list"
        aria-controls="suggestions"
        aria-expanded="false"
      />
      <div class="suggestions" id="suggestions" role="listbox"></div>
    </div>
    <button id="analyzeBtn" onclick="runAnalysis()">Analyze</button>
  </div>
</div>

<!-- Step Pipeline -->
<div class="pipeline" id="pipeline" style="display:none;">

  <!-- Step 1 -->
  <div class="step" id="step1">
    <div class="step-header">
      <div class="step-badge">1</div>
      <div class="step-title">Geocode Address</div>
      <div class="step-status" id="step1Status">Waiting</div>
    </div>
    <div class="step-body" id="step1Body"></div>
  </div>

  <!-- Step 2 -->
  <div class="step" id="step2">
    <div class="step-header">
      <div class="step-badge">2</div>
      <div class="step-title">Parcel &amp; Zoning Lookup</div>
      <div class="step-status" id="step2Status">Waiting</div>
    </div>
    <div class="step-body" id="step2Body"></div>
  </div>

</div>

<footer>Steps 3–5 (Bylaw Lookup, FSR Calculation, Revenue Estimate) coming soon.</footer>

<script>
  // ─── Constants ───────────────────────────────────────────────────────────────

  const GEOCODER_URL = 'https://geocoder.api.gov.bc.ca/addresses.json';

  // Abbotsford WebMap — Layer 18 is Parcels (includes ZONING field)
  const ABBY_PARCEL_URL =
    'https://maps.abbotsford.ca/arcgis/rest/services/GeocortexExt/WebMap/MapServer/18/query';

  // ─── UI helpers ──────────────────────────────────────────────────────────────

  function setStep(n, state, statusText) {
    const el = document.getElementById('step' + n);
    el.className = 'step ' + state;
    document.getElementById('step' + n + 'Status').innerHTML =
      state === 'active'
        ? '<span class="spinner"></span>' + statusText
        : statusText;
  }

  function setStepBody(n, html) {
    document.getElementById('step' + n + 'Body').innerHTML = html;
  }

  function resultGrid(items) {
    return (
      '<div class="result-grid">' +
      items
        .map(
          ([label, val, highlight]) =>
            `<div class="result-item"><label>${label}</label>` +
            `<div class="val${highlight ? ' highlight' : ''}">${val ?? '<span style="color:var(--muted)">—</span>'}</div></div>`
        )
        .join('') +
      '</div>'
    );
  }

  function rawJson(obj) {
    return (
      '<details><summary>Raw response</summary>' +
      '<pre>' +
      JSON.stringify(obj, null, 2).replace(/</g, '&lt;').replace(/>/g, '&gt;') +
      '</pre></details>'
    );
  }

  // ─── Step 1: Geocode ─────────────────────────────────────────────────────────

  async function geocodeAddress(address) {
    const params = new URLSearchParams({
      addressString: address,
      maxResults: 1,
      outputSRS: 4326,
      locationDescriptor: 'parcelPoint',
    });

    const res = await fetch(`${GEOCODER_URL}?${params}`);
    if (!res.ok) throw new Error(`Geocoder returned HTTP ${res.status}`);

    const data = await res.json();

    if (!data.features || data.features.length === 0) {
      throw new Error('No geocoder results found for this address. Try including the city (e.g. "123 Main St, Abbotsford, BC").');
    }

    const feature = data.features[0];
    const [lng, lat] = feature.geometry.coordinates;
    const props = feature.properties;

    return { lat, lng, props, raw: data };
  }

  // ─── Step 2: Parcel + Zoning ─────────────────────────────────────────────────

  async function lookupParcel(lng, lat) {
    const params = new URLSearchParams({
      geometry: `${lng},${lat}`,
      geometryType: 'esriGeometryPoint',
      spatialRel: 'esriSpatialRelIntersects',
      inSR: 4326,
      outSR: 4326,
      outFields: '*',
      returnGeometry: false,
      f: 'json',
    });

    const res = await fetch(`${ABBY_PARCEL_URL}?${params}`);
    if (!res.ok) throw new Error(`Abbotsford GIS returned HTTP ${res.status}`);

    const data = await res.json();

    if (data.error) {
      throw new Error(`GIS error ${data.error.code}: ${data.error.message}`);
    }

    if (!data.features || data.features.length === 0) {
      throw new Error(
        'No parcel found at these coordinates. The property may be outside Abbotsford city limits, or the GIS layer may not cover this area.'
      );
    }

    return { attrs: data.features[0].attributes, raw: data };
  }

  // ─── Main ────────────────────────────────────────────────────────────────────

  async function runAnalysis() {
    const address = document.getElementById('addressInput').value.trim();
    if (!address) {
      document.getElementById('addressInput').focus();
      return;
    }

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;

    // Show pipeline, reset steps
    document.getElementById('pipeline').style.display = 'flex';
    for (let i = 1; i <= 2; i++) {
      setStep(i, '', 'Waiting');
      setStepBody(i, '');
    }

    // ── Step 1 ───────────────────────────────────────────────────────────────
    setStep(1, 'active', 'Geocoding…');

    let geocodeResult;
    try {
      geocodeResult = await geocodeAddress(address);
    } catch (err) {
      setStep(1, 'error', 'Failed');
      setStepBody(
        1,
        `<p class="error-msg">&#9888; ${escHtml(err.message)}</p>`
      );
      btn.disabled = false;
      return;
    }

    const { lat, lng, props, raw: geoRaw } = geocodeResult;

    setStep(1, 'done', 'Complete');
    setStepBody(
      1,
      resultGrid([
        ['Matched Address', props.fullAddress],
        ['Latitude', lat.toFixed(6)],
        ['Longitude', lng.toFixed(6)],
        ['Match Score', props.score ? props.score + ' / 100' : null],
        ['Precision', props.matchPrecision],
        ['Locality', props.localityName],
      ]) + rawJson(geoRaw)
    );

    // ── Step 2 ───────────────────────────────────────────────────────────────
    setStep(2, 'active', 'Querying GIS…');

    let parcelResult;
    try {
      parcelResult = await lookupParcel(lng, lat);
    } catch (err) {
      setStep(2, 'error', 'Failed');
      setStepBody(
        2,
        `<p class="error-msg">&#9888; ${escHtml(err.message)}</p>`
      );
      btn.disabled = false;
      return;
    }

    const a = parcelResult.attrs;

    // Build a tidy set of display fields — use whatever is present
    const zone = a.ZONING ?? a.ZONE ?? a.Zone ?? a.zone ?? null;
    const pid = a.PID ?? a.pid ?? null;
    const propAddr = a.PROP_ADDRESS ?? a.ADDRESS ?? a.Address ?? null;
    const landVal = a.LAND_VALUE != null ? '$' + Number(a.LAND_VALUE).toLocaleString() : null;
    const impVal = a.IMP_VALUE != null ? '$' + Number(a.IMP_VALUE).toLocaleString() : null;
    const ttlVal = a.TTL_VALUE != null ? '$' + Number(a.TTL_VALUE).toLocaleString() : null;
    const area = a.SHAPE_Area != null ? Number(a.SHAPE_Area).toFixed(1) + ' m²' : null;
    const alr = a.ALR != null ? (a.ALR ? 'Yes' : 'No') : null;
    const flood = a.FLOODPLN != null ? (a.FLOODPLN ? 'Yes' : 'No') : null;
    const ocp = a.OCP_LandUse ?? a.OCP ?? null;
    const useDesc = a.USE_DESC ?? a.LUC ?? null;

    setStep(2, 'done', 'Complete');
    setStepBody(
      2,
      resultGrid([
        ['Zone', zone, true],
        ['OCP Land Use', ocp],
        ['Use Description', useDesc],
        ['PID', pid],
        ['Address (GIS)', propAddr],
        ['Parcel Area', area],
        ['Land Value (BC Assessment)', landVal],
        ['Improvement Value', impVal],
        ['Total Value', ttlVal],
        ['In ALR', alr],
        ['Flood Plain', flood],
      ]) + rawJson(parcelResult.raw)
    );

    btn.disabled = false;
  }

  // ─── Utility ─────────────────────────────────────────────────────────────────

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // ─── Autocomplete ────────────────────────────────────────────────────────────

  const inputEl = document.getElementById('addressInput');
  const sugBox   = document.getElementById('suggestions');
  let debounceTimer = null;
  let activeIndex   = -1;
  let currentSuggestions = [];

  inputEl.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const val = inputEl.value.trim();
    if (val.length < 3) { closeSuggestions(); return; }
    debounceTimer = setTimeout(() => fetchSuggestions(val), 220);
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      moveCursor(1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      moveCursor(-1);
    } else if (e.key === 'Enter') {
      if (activeIndex >= 0 && currentSuggestions[activeIndex]) {
        pickSuggestion(currentSuggestions[activeIndex]);
      } else {
        closeSuggestions();
        runAnalysis();
      }
    } else if (e.key === 'Escape') {
      closeSuggestions();
    }
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.input-wrap')) closeSuggestions();
  });

  async function fetchSuggestions(query) {
    const params = new URLSearchParams({
      addressString: query,
      maxResults: 6,
      autoComplete: true,
      minScore: 50,
      outputSRS: 4326,
    });
    try {
      const res = await fetch(`${GEOCODER_URL}?${params}`);
      if (!res.ok) return;
      const data = await res.json();
      renderSuggestions(data.features || []);
    } catch (_) {
      // silently ignore autocomplete errors
    }
  }

  function renderSuggestions(features) {
    currentSuggestions = features;
    activeIndex = -1;
    if (features.length === 0) { closeSuggestions(); return; }

    sugBox.innerHTML = features.map((f, i) => {
      const addr = f.properties.fullAddress || '';
      const score = f.properties.score ? Math.round(f.properties.score) : '';
      return `<div class="suggestion-item" role="option" data-i="${i}">
        ${escHtml(addr)}
        ${score ? `<span class="sug-score">${score}%</span>` : ''}
      </div>`;
    }).join('');

    sugBox.querySelectorAll('.suggestion-item').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault(); // don't blur input
        pickSuggestion(features[+el.dataset.i]);
      });
    });

    sugBox.classList.add('open');
    inputEl.setAttribute('aria-expanded', 'true');
  }

  function moveCursor(dir) {
    const items = sugBox.querySelectorAll('.suggestion-item');
    if (!items.length) return;
    items[activeIndex]?.classList.remove('active');
    activeIndex = Math.max(-1, Math.min(items.length - 1, activeIndex + dir));
    if (activeIndex >= 0) {
      items[activeIndex].classList.add('active');
      inputEl.value = currentSuggestions[activeIndex].properties.fullAddress;
    }
  }

  function pickSuggestion(feature) {
    inputEl.value = feature.properties.fullAddress;
    closeSuggestions();
    runAnalysis();
  }

  function closeSuggestions() {
    sugBox.classList.remove('open');
    sugBox.innerHTML = '';
    inputEl.setAttribute('aria-expanded', 'false');
    activeIndex = -1;
    currentSuggestions = [];
  }
</script>
</body>
</html>
